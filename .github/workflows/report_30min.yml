name: 고요나 리포트(교차검증판)

on:
  workflow_dispatch:
  # 2026-04-22 로컬 launchd 이관 (com.goyona.cross-report) · 중복 실행 방지 위해 schedule 제거
  # 이유: cafe24 refresh_token 1회성 정책 · GitHub Actions는 매번 stale env 사용 → 실패 누적
  # 로컬은 cafe24_state.json rotation으로 stale 원천 소멸

permissions:
  contents: write

jobs:
  cross_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install google-analytics-data google-auth

      - name: 리포트+교차검증 전송
        id: run_report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GA_PROPERTY: ${{ secrets.GA_PROPERTY }}
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
          CAFE24_REFRESH_TOKEN: ${{ secrets.CAFE24_REFRESH_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CROSS_SHEET_ID: ${{ secrets.CROSS_SHEET_ID }}
          PRODUCT_COST: ${{ secrets.PRODUCT_COST }}
          PRODUCT_PRICE: ${{ secrets.PRODUCT_PRICE }}
        run: python cross_report.py

      - name: 카페24 토큰 state 커밋
        if: success()
        run: |
          if [ -f cafe24_state.json ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add cafe24_state.json
            git diff --cached --quiet || (git commit -m "카페24 토큰 자동 갱신(cross)" && git push)
          fi

      - name: 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MSG="🚨 GitHub Actions 실패: cross_report (${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG} https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
