name: 고요나 전날 매출 정리

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 UTC 03:00 = KST 12:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install google-analytics-data google-auth

      - name: 전날 리포트 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GA_PROPERTY: ${{ secrets.GA_PROPERTY }}
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
          CAFE24_REFRESH_TOKEN: ${{ secrets.CAFE24_REFRESH_TOKEN }}
          PRODUCT_COST: ${{ secrets.PRODUCT_COST }}
          PRODUCT_PRICE: ${{ secrets.PRODUCT_PRICE }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python daily_report.py

      - name: 토큰 갱신분 커밋
        run: |
          if [ -f cafe24_state.json ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add cafe24_state.json
            git diff --cached --quiet || (git commit -m "카페24 토큰 자동 갱신(daily)" && git push)
          fi

      - name: 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MSG="🚨 GitHub Actions 실패: daily_report (${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG} https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
