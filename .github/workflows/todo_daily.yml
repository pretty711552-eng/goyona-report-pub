name: 매일 투두 정리

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = KST 09:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  todo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 투두 요약 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TODO_CHAT_ID: ${{ secrets.TODO_CHAT_ID }}
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
        run: python todo_daily.py

      - name: 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MSG="🚨 GitHub Actions 실패: todo_daily (${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG} https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
